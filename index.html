<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>GradLab · 极简科研工作台</title>
    <!-- Bootstrap 5 (仅用于布局和折叠导航，风格完全自定义) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 高级字体：Inter +  Noto Sans SC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- SortableJS 拖拽库 (支持触摸) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* ----- 全局极暗变量 ----- */
        :root {
            --xm-black: #000000;
            --xm-dark-1: #0a0a0a;
            --xm-dark-2: #141414;
            --xm-gray-text: #86868b;
            --xm-white: #f5f5f7;
            --xm-accent: #e5e5e5;
            --xm-border: rgba(255, 255, 255, 0.08);
            --xm-card-bg: #141414;
            --xm-hover-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--xm-black);
            color: var(--xm-white);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* 自定义滚动条 (极细) */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--xm-black); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- 毛玻璃导航 --- */
        .navbar {
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--xm-border);
            padding: 12px 0;
            transition: background 0.3s ease;
        }
        .navbar.scrolled {
            background: rgba(0, 0, 0, 0.85) !important;
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #fff !important;
        }
        .navbar-brand i {
            color: #fff;
            margin-right: 6px;
        }
        .nav-link {
            color: var(--xm-gray-text) !important;
            font-size: 0.9rem;
            margin: 0 12px;
            padding: 6px 0;
            transition: color 0.3s;
            font-weight: 400;
            border-bottom: 2px solid transparent;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff !important;
            border-bottom-color: #fff;
        }
        .navbar-toggler {
            border: none;
            padding: 0;
        }
        .navbar-toggler:focus {
            box-shadow: none;
        }
        .navbar-toggler i {
            font-size: 1.5rem;
            color: #fff;
        }

        /* --- 滚动浮现动画 --- */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 主内容容器 (仿宣传页留白) --- */
        .main-content {
            padding-top: 80px;  /* 避免导航遮挡 */
            min-height: calc(100vh - 70px);
        }
        .section-header {
            text-align: center;
            margin: 60px 0 50px;
        }
        .section-header h2 {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
        }
        .section-header p {
            font-size: 1.1rem;
            color: var(--xm-gray-text);
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- 卡片设计 (极简深色圆角) --- */
        .xm-card {
            background-color: var(--xm-card-bg);
            border-radius: 24px;
            padding: 30px;
            height: 100%;
            transition: transform 0.3s ease, background-color 0.3s ease;
            border: 1px solid var(--xm-border);
        }
        .xm-card:hover {
            transform: translateY(-5px);
            background-color: var(--xm-hover-bg);
        }

        /* --- 任务看板三列 (深色模式版) --- */
        .board-wrapper {
            margin-top: 30px;
        }
        .board-columns {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .column {
            flex: 1;
            background: var(--xm-dark-1);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid var(--xm-border);
        }
        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }
        .column-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .task-count {
            background: rgba(255,255,255,0.1);
            color: var(--xm-gray-text);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid var(--xm-border);
        }
        .task-list {
            min-height: 280px;
        }
        .task-item {
            background: var(--xm-dark-2);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid var(--xm-border);
            cursor: grab;
            transition: all 0.2s;
            position: relative;
            touch-action: pan-y;
        }
        .task-item:active {
            cursor: grabbing;
            border-color: #444;
        }
        .task-title {
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 8px;
            padding-right: 28px;
            word-break: break-word;
            color: #fff;
        }
        .task-meta {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.75rem;
            color: var(--xm-gray-text);
            flex-wrap: wrap;
        }
        .priority-badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .priority-high { color: #ff8a80; }      /* 柔和红 */
        .priority-medium { color: #ffb74d; }    /* 暖橙 */
        .priority-low { color: #81c784; }        /* 淡绿 */
        .delete-task {
            position: absolute;
            top: 14px;
            right: 14px;
            color: var(--xm-gray-text);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: 0.2s;
            padding: 6px;
        }
        .delete-task:hover {
            opacity: 1;
            color: #ff8a80;
        }
        .add-task-form {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .add-task-form input {
            flex: 1;
            background: var(--xm-dark-2);
            border: 1px solid var(--xm-border);
            border-radius: 40px;
            padding: 12px 18px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .add-task-form input:focus {
            border-color: #666;
        }
        .add-task-form button {
            background: #fff;
            border: none;
            color: #000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .add-task-form button:hover {
            background: #e0e0e0;
        }

        /* --- 文献管理表格 (暗黑风格) --- */
        .lit-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        .lit-table th {
            text-align: left;
            padding: 16px 12px;
            font-weight: 600;
            color: #fff;
            border-bottom: 1px solid var(--xm-border);
            font-size: 0.9rem;
        }
        .lit-table td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--xm-border);
            color: #d0d0d0;
            font-size: 0.9rem;
        }
        .lit-table select {
            background: var(--xm-dark-2);
            border: 1px solid var(--xm-border);
            border-radius: 30px;
            padding: 6px 12px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
        }
        .lit-table select option {
            background: var(--xm-dark-1);
        }
        .tag-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag {
            background: rgba(255,255,255,0.06);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: var(--xm-gray-text);
            border: 1px solid var(--xm-border);
        }
        .add-paper-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            background: var(--xm-dark-1);
            padding: 20px 24px;
            border-radius: 60px;
            margin: 40px 0 20px;
            border: 1px solid var(--xm-border);
        }
        .add-paper-form input {
            background: var(--xm-dark-2);
            border: 1px solid var(--xm-border);
            border-radius: 40px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.9rem;
            flex: 1 1 180px;
            min-width: 140px;
        }
        .add-paper-form button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .add-paper-form button:hover {
            background: #e0e0e0;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--xm-gray-text);
            cursor: pointer;
            font-size: 1rem;
            padding: 8px;
            transition: 0.2s;
        }
        .icon-btn:hover {
            color: #fff;
        }

        /* --- 统计卡片 (仿宣传页数字) --- */
        .stat-row {
            margin: 40px 0 20px;
        }
        .stat-item {
            text-align: center;
            border-right: 1px solid var(--xm-border);
        }
        .stat-item:last-child { border-right: none; }
        .stat-num {
            font-size: 2.6rem;
            font-weight: 300;
            color: #fff;
            line-height: 1.2;
        }
        .stat-desc {
            font-size: 0.8rem;
            color: var(--xm-gray-text);
            text-transform: uppercase;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .board-columns { flex-direction: column; }
            .stat-item { border-right: none; border-bottom: 1px solid var(--xm-border); padding-bottom: 20px; margin-bottom: 20px; }
            .stat-item:last-child { border-bottom: none; }
            .add-paper-form { border-radius: 30px; flex-direction: column; align-items: stretch; }
            .add-paper-form button { width: 100%; justify-content: center; }
            .lit-table { display: block; overflow-x: auto; }
        }

        /* 工具类 */
        .text-muted-custom { color: var(--xm-gray-text); }
        .bg-dark-1 { background-color: var(--xm-dark-1); }
    </style>
</head>
<body>

    <!-- 毛玻璃导航 (固定顶部) -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-flask"></i> GradLab</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" data-view="board" href="#">任务看板</a></li>
                    <li class="nav-item"><a class="nav-link" data-view="literature" href="#">文献管理</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 (动态切换) -->
    <div class="main-content" id="mainContent">
        <!-- 内容由JS渲染，但先放置一个占位符 -->
        <div class="container" id="dynamicContent"></div>
    </div>

    <!-- 极简页脚 (可选) -->
    <footer class="text-center py-4 text-muted-custom" style="border-top: 1px solid var(--xm-border); margin-top: 40px;">
        <small>GradLab · 研究生科研管理 · 本地数据存储</small>
    </footer>

    <!-- Bootstrap JS (用于导航折叠) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (function() {
            // ---------- 数据层 (localStorage) ----------
            const STORAGE_TASKS = 'grad_tasks_v2';
            const STORAGE_PAPERS = 'grad_papers_v2';

            const defaultTasks = [
                { id: '1', title: '阅读三篇Transformer相关论文', status: 'todo', priority: 'high', dueDate: '2025-04-10' },
                { id: '2', title: '完成实验数据预处理', status: 'doing', priority: 'high', dueDate: '2025-04-05' },
                { id: '3', title: '指导张三完成比赛 baseline', status: 'todo', priority: 'medium', dueDate: '2025-04-07' },
                { id: '4', title: '组会PPT制作', status: 'done', priority: 'low', dueDate: '2025-04-01' },
            ];

            const defaultPapers = [
                { id: '1', title: 'Attention Is All You Need', authors: 'Vaswani et al.', year: '2017', status: 'read', tags: ['transformer', 'NLP'] },
                { id: '2', title: 'BERT: Pre-training of Deep Bidirectional Transformers', authors: 'Devlin et al.', year: '2018', status: 'reading', tags: ['NLP', 'pretrain'] },
                { id: '3', title: 'ResNet: Deep Residual Learning', authors: 'He et al.', year: '2015', status: 'unread', tags: ['CV', 'backbone'] },
            ];

            function loadTasks() {
                const stored = localStorage.getItem(STORAGE_TASKS);
                if (stored) {
                    try { return JSON.parse(stored); } catch { return defaultTasks; }
                } else {
                    localStorage.setItem(STORAGE_TASKS, JSON.stringify(defaultTasks));
                    return defaultTasks;
                }
            }
            function saveTasks(tasks) { localStorage.setItem(STORAGE_TASKS, JSON.stringify(tasks)); }
            function loadPapers() {
                const stored = localStorage.getItem(STORAGE_PAPERS);
                if (stored) {
                    try { return JSON.parse(stored); } catch { return defaultPapers; }
                } else {
                    localStorage.setItem(STORAGE_PAPERS, JSON.stringify(defaultPapers));
                    return defaultPapers;
                }
            }
            function savePapers(papers) { localStorage.setItem(STORAGE_PAPERS, JSON.stringify(papers)); }

            let currentView = 'board';
            let tasks = loadTasks();
            let papers = loadPapers();

            // DOM 元素
            const dynamicContent = document.getElementById('dynamicContent');
            const navLinks = document.querySelectorAll('.nav-link[data-view]');
            const navbar = document.querySelector('.navbar');

            // 导航激活状态 + 视图切换
            function setActiveNav(view) {
                navLinks.forEach(link => {
                    const v = link.dataset.view;
                    if (v === view) link.classList.add('active');
                    else link.classList.remove('active');
                });
            }

            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const view = link.dataset.view;
                    if (view === currentView) return;
                    currentView = view;
                    setActiveNav(view);
                    renderView();
                    // 移动端折叠菜单 (bootstrap 折叠)
                    const navbarCollapse = document.getElementById('navbarNav');
                    if (navbarCollapse.classList.contains('show')) {
                        navbarCollapse.classList.remove('show');
                    }
                });
            });

            // 滚动时改变导航透明度
            window.addEventListener('scroll', () => {
                if (window.scrollY > 30) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');
            });

            // 工具函数
            function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                    return m;
                });
            }

            // 渲染视图
            function renderView() {
                if (currentView === 'board') renderBoard();
                else renderLiterature();
                // 触发滚动动画 (新内容插入后重新观察)
                observeReveal();
            }

            // Intersection Observer 实现浮现动画
            const observerOptions = { threshold: 0.2, rootMargin: '0px' };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            function observeReveal() {
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }

            // ---------- 任务看板 ----------
            function renderBoard() {
                const tasksByStatus = {
                    todo: tasks.filter(t => t.status === 'todo'),
                    doing: tasks.filter(t => t.status === 'doing'),
                    done: tasks.filter(t => t.status === 'done')
                };

                const html = `
                    <div class="section-header reveal">
                        <h2>任务看板</h2>
                        <p>拖拽卡片改变状态 · 科研与带队任务一目了然</p>
                    </div>
                    <!-- 统计卡片 (极简) -->
                    <div class="row stat-row reveal">
                        <div class="col-md-4 stat-item">
                            <div class="stat-num">${tasks.length}</div>
                            <div class="stat-desc">总任务</div>
                        </div>
                        <div class="col-md-4 stat-item">
                            <div class="stat-num">${tasks.filter(t => t.status === 'doing').length}</div>
                            <div class="stat-desc">进行中</div>
                        </div>
                        <div class="col-md-4 stat-item">
                            <div class="stat-num">${tasks.filter(t => t.status === 'done').length}</div>
                            <div class="stat-desc">已完成</div>
                        </div>
                    </div>

                    <div class="board-wrapper reveal">
                        <div class="board-columns">
                            ${['todo', 'doing', 'done'].map(status => {
                                const statusName = status === 'todo' ? '待处理' : (status === 'doing' ? '进行中' : '已完成');
                                const statusTasks = tasksByStatus[status] || [];
                                return `
                                <div class="column" data-status="${status}">
                                    <div class="column-header">
                                        <h3>${statusName}</h3>
                                        <span class="task-count">${statusTasks.length}</span>
                                    </div>
                                    <div class="task-list" id="list-${status}" data-status="${status}">
                                        ${statusTasks.map(task => renderTaskCard(task)).join('')}
                                    </div>
                                    <div class="add-task-form">
                                        <input type="text" placeholder="新任务..." id="input-${status}" />
                                        <button class="add-task-btn" data-status="${status}"><i class="fas fa-plus"></i></button>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                dynamicContent.innerHTML = html;

                // 初始化拖拽
                const todoList = document.getElementById('list-todo');
                const doingList = document.getElementById('list-doing');
                const doneList = document.getElementById('list-done');
                if (todoList && doingList && doneList) {
                    new Sortable(todoList, { group: 'tasks', animation: 200, onEnd: handleDragEnd });
                    new Sortable(doingList, { group: 'tasks', animation: 200, onEnd: handleDragEnd });
                    new Sortable(doneList, { group: 'tasks', animation: 200, onEnd: handleDragEnd });
                }

                // 添加任务
                document.querySelectorAll('.add-task-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const status = e.currentTarget.dataset.status;
                        const input = document.getElementById(`input-${status}`);
                        const title = input.value.trim();
                        if (!title) return;
                        const newTask = {
                            id: genId(),
                            title,
                            status,
                            priority: 'medium',
                            dueDate: new Date().toISOString().slice(0,10)
                        };
                        tasks.push(newTask);
                        saveTasks(tasks);
                        renderBoard();
                    });
                });

                // 删除任务
                document.querySelectorAll('.delete-task').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const taskId = e.currentTarget.dataset.id;
                        tasks = tasks.filter(t => t.id !== taskId);
                        saveTasks(tasks);
                        renderBoard();
                    });
                });
            }

            function renderTaskCard(task) {
                const priorityClass = 
                    task.priority === 'high' ? 'priority-high' : 
                    task.priority === 'medium' ? 'priority-medium' : 'priority-low';
                const priorityText = 
                    task.priority === 'high' ? '高' : 
                    task.priority === 'medium' ? '中' : '低';
                return `
                    <div class="task-item" data-id="${task.id}">
                        <div class="delete-task" data-id="${task.id}"><i class="fas fa-times"></i></div>
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        <div class="task-meta">
                            <span class="priority-badge ${priorityClass}">${priorityText}</span>
                            ${task.dueDate ? `<span><i class="far fa-calendar-alt"></i> ${task.dueDate}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            function handleDragEnd(evt) {
                const taskId = evt.item.dataset.id;
                const newStatus = evt.to.dataset.status;
                const task = tasks.find(t => t.id === taskId);
                if (task && task.status !== newStatus) {
                    task.status = newStatus;
                    saveTasks(tasks);
                    renderBoard();
                }
            }

            // ---------- 文献管理 ----------
            function renderLiterature() {
                const rows = papers.map(p => `
                    <tr data-id="${p.id}">
                        <td>${escapeHtml(p.title)}</td>
                        <td>${escapeHtml(p.authors || '')}</td>
                        <td>${p.year || ''}</td>
                        <td>
                            <select class="status-select" data-id="${p.id}">
                                <option value="unread" ${p.status === 'unread' ? 'selected' : ''}>未读</option>
                                <option value="reading" ${p.status === 'reading' ? 'selected' : ''}>阅读中</option>
                                <option value="read" ${p.status === 'read' ? 'selected' : ''}>已读</option>
                            </select>
                        </td>
                        <td>
                            <div class="tag-group">
                                ${(p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                                <button class="icon-btn edit-tags" data-id="${p.id}" title="编辑标签"><i class="fas fa-pencil-alt"></i></button>
                            </div>
                        </td>
                        <td>
                            <button class="icon-btn delete-paper" data-id="${p.id}"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');

                const html = `
                    <div class="section-header reveal">
                        <h2>文献管理</h2>
                        <p>跟踪阅读进度 · 构建个人知识库</p>
                    </div>
                    <div class="reveal">
                        <div class="add-paper-form">
                            <input type="text" placeholder="标题 *" id="new-title">
                            <input type="text" placeholder="作者" id="new-authors">
                            <input type="text" placeholder="年份" id="new-year">
                            <input type="text" placeholder="标签 (逗号分隔)" id="new-tags">
                            <button id="add-paper-btn"><i class="fas fa-plus"></i> 添加文献</button>
                        </div>
                        <table class="lit-table">
                            <thead>
                                <tr><th>标题</th><th>作者</th><th>年份</th><th>状态</th><th>标签</th><th></th></tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                `;
                dynamicContent.innerHTML = html;

                document.getElementById('add-paper-btn')?.addEventListener('click', () => {
                    const title = document.getElementById('new-title').value.trim();
                    if (!title) return;
                    const authors = document.getElementById('new-authors').value.trim();
                    const year = document.getElementById('new-year').value.trim();
                    const tagsStr = document.getElementById('new-tags').value.trim();
                    const tags = tagsStr ? tagsStr.split(',').map(s => s.trim()).filter(s => s) : [];
                    const newPaper = { id: genId(), title, authors, year, status: 'unread', tags };
                    papers.push(newPaper);
                    savePapers(papers);
                    renderLiterature();
                });

                document.querySelectorAll('.status-select').forEach(sel => {
                    sel.addEventListener('change', (e) => {
                        const id = e.target.dataset.id;
                        const paper = papers.find(p => p.id === id);
                        if (paper) { paper.status = e.target.value; savePapers(papers); }
                    });
                });

                document.querySelectorAll('.delete-paper').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.dataset.id;
                        papers = papers.filter(p => p.id !== id);
                        savePapers(papers);
                        renderLiterature();
                    });
                });

                document.querySelectorAll('.edit-tags').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.dataset.id;
                        const paper = papers.find(p => p.id === id);
                        if (!paper) return;
                        const newTags = prompt('输入标签 (逗号分隔)', (paper.tags || []).join(', '));
                        if (newTags !== null) {
                            paper.tags = newTags.split(',').map(s => s.trim()).filter(s => s);
                            savePapers(papers);
                            renderLiterature();
                        }
                    });
                });
            }

            // 初始渲染
            renderView();

            // 监听新插入元素
            observeReveal();
        })();
    </script>
</body>
</html>
